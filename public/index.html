<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Sustainable Wellness Coach | Tina Yeager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8a9e7e;
    --sage-light: #c5d4bc;
    --sage-dark: #5a6e50;
    --cream: #f7f4ee;
    --warm-white: #fdfbf7;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --charcoal: #2c2c2c;
    --mid-gray: #6b6b6b;
    --light-gray: #e8e4dc;
    --ai-bubble: #ffffff;
    --shadow: rgba(90, 110, 80, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--warm-white);
    border-bottom: 1px solid var(--light-gray);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px var(--shadow);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: white;
    font-weight: 600;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--charcoal);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 0.72rem;
    color: var(--mid-gray);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #7bc67e;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(123,198,126,0.25);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--sage-light); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 500;
    align-self: flex-end;
    font-family: 'Cormorant Garamond', serif;
  }

  .message.assistant .msg-icon {
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    color: white;
    font-size: 0.75rem;
  }

  .message.user .msg-icon {
    background: var(--gold-light);
    color: var(--sage-dark);
    font-size: 0.65rem;
    font-family: 'Jost', sans-serif;
  }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.65;
    font-weight: 300;
  }

  .message.assistant .bubble {
    background: var(--ai-bubble);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 10px var(--shadow);
    color: var(--charcoal);
  }

  .message.user .bubble {
    background: var(--sage-dark);
    color: white;
    border-radius: 18px 4px 18px 18px;
  }

  .bubble p { margin-bottom: 0.6em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 500; color: var(--sage-dark); }
  .message.user .bubble strong { color: var(--gold-light); }

  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 17px;
    background: var(--ai-bubble);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 10px var(--shadow);
    width: fit-content;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--sage-light);
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); background: var(--sage-light); }
    30% { transform: translateY(-6px); background: var(--sage); }
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 4px 0 8px 42px;
  }

  .chip {
    background: var(--warm-white);
    border: 1px solid var(--sage-light);
    color: var(--sage-dark);
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Jost', sans-serif;
  }

  .chip:hover {
    background: var(--sage-light);
    border-color: var(--sage);
    transform: translateY(-1px);
  }

  .disclaimer {
    font-size: 0.7rem;
    color: var(--mid-gray);
    text-align: center;
    padding: 6px 20px 2px;
    font-weight: 300;
    flex-shrink: 0;
  }

  .input-area {
    background: var(--warm-white);
    border-top: 1px solid var(--light-gray);
    padding: 12px 16px 16px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--cream);
    border: 1.5px solid var(--light-gray);
    border-radius: 26px;
    padding: 8px 8px 8px 18px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-row:focus-within {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(138, 158, 126, 0.12);
  }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.92rem;
    font-weight: 300;
    color: var(--charcoal);
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: #aaa; }

  #sendBtn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease, opacity 0.15s ease;
    box-shadow: 0 2px 8px var(--shadow);
  }

  #sendBtn:hover { transform: scale(1.05); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.45; cursor: default; transform: none; }
  #sendBtn svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

  .ornament {
    text-align: center;
    padding: 4px 0 12px;
    color: var(--sage-light);
    font-size: 1.2rem;
    letter-spacing: 0.3em;
  }
</style>
</head>
<body>

<header>
  <div class="avatar">TY</div>
  <div class="header-text">
    <h1>Your Wellness Coach</h1>
    <p>Sustainable Weight Loss · Tina Yeager</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="messages">
  <div class="ornament">✦ ✦ ✦</div>
</div>

<p class="disclaimer">For educational support only. Always consult a qualified professional for medical concerns.</p>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="Ask your wellness coach anything…" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
let conversationHistory = [];
let isLoading = false;

function addMessage(role, content) {
  const messagesDiv = document.getElementById('messages');
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'assistant' ? 'TY' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMessage(content);

  msgDiv.appendChild(icon);
  msgDiv.appendChild(bubble);
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function formatMessage(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function addTypingIndicator() {
  const messagesDiv = document.getElementById('messages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  msgDiv.id = 'typing';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'TY';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';

  msgDiv.appendChild(icon);
  msgDiv.appendChild(indicator);
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTypingIndicator() {
  const typing = document.getElementById('typing');
  if (typing) typing.remove();
}

function addSuggestions(chips) {
  const messagesDiv = document.getElementById('messages');
  const sugDiv = document.createElement('div');
  sugDiv.className = 'suggestions';
  chips.forEach(text => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = text;
    chip.onclick = () => {
      document.getElementById('userInput').value = text;
      sugDiv.remove();
      sendMessage();
    };
    sugDiv.appendChild(chip);
  });
  messagesDiv.appendChild(sugDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isLoading) return;

  document.querySelectorAll('.suggestions').forEach(s => s.remove());

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  btn.disabled = true;

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  addTypingIndicator();

  try {
    // Call YOUR secure backend — API key never touches the browser
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();
    removeTypingIndicator();

    const reply = data.content?.map(b => b.text || '').join('') || "I'm here with you. Could you try rephrasing that?";
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);

  } catch (err) {
    removeTypingIndicator();
    addMessage('assistant', "I'm having a little trouble connecting right now. Please try again in a moment — I'm here for you.");
  }

  isLoading = false;
  btn.disabled = false;
  input.focus();
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('userInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

window.addEventListener('load', () => {
  setTimeout(() => {
    const welcome = `Welcome! I'm your personal wellness coach, trained on Tina Yeager's **Sustainable Weight Loss: Ditch the Diet** course.

I'm here to walk alongside you on this journey — whether you need help with nutrition, movement, mindset, sleep, stress, or just encouragement when the path feels hard.

Remember: **little betters toward your ultimate best.** You don't have to be perfect. You just have to keep going.

What can I help you with today?`;
    addMessage('assistant', welcome);
    conversationHistory.push({ role: 'assistant', content: "Welcome! I'm your personal wellness coach, trained on Tina Yeager's Sustainable Weight Loss: Ditch the Diet course. I'm here to walk alongside you on this journey — whether you need help with nutrition, movement, mindset, sleep, stress, or just encouragement when the path feels hard. Remember: little betters toward your ultimate best. You don't have to be perfect. You just have to keep going. What can I help you with today?" });

    addSuggestions([
      "Help me understand my eating triggers",
      "What should I eat for breakfast?",
      "I'm struggling with emotional eating",
      "How do I set realistic goals?",
      "I had a setback — now what?"
    ]);
  }, 400);
});
</script>
</body>
</html>
